# Publish the scoped package to npmjs when a GitHub release is published.

name: Publish to npm

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun test
      - run: bun run build

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          registry-url: https://registry.npmjs.org
      - env:
          BUN_AUTH_TOKEN: ${{ secrets.npm_token }}
        run: bun install --frozen-lockfile
      - env:
          BUN_AUTH_TOKEN: ${{ secrets.npm_token }}
        run: bun publish
