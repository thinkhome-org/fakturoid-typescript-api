# Publish the scoped package to GitHub npm Registry when a GitHub release is published.

name: Publish to GitHub npm Registry

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun test
      - run: bun run build

  publish-gpr:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          registries: |
            @thinkhome-org:https://npm.pkg.github.com/|$GITHUB_TOKEN
      - env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUN_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun install --frozen-lockfile
      - env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUN_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun publish --registry https://npm.pkg.github.com
